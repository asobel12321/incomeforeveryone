name: Daily X headline post

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Post date as YYYY-MM-DD. Defaults to today in New York."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-x-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve post date
        id: post-date
        run: |
          if [ -n "${{ inputs.date || '' }}" ]; then
            echo "date=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=America/New_York date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for generated article
        run: |
          post_path="content/posts/${{ steps.post-date.outputs.date }}.md"

          for attempt in $(seq 1 31); do
            git pull --ff-only origin main

            if [ -f "$post_path" ]; then
              echo "Found $post_path"
              exit 0
            fi

            if [ "$attempt" -eq 31 ]; then
              echo "::error::Timed out waiting for $post_path"
              exit 1
            fi

            echo "Waiting for $post_path; attempt $attempt/31"
            sleep 60
          done

      - name: Post daily headline to X
        env:
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          X_USER_BEARER_TOKEN: ${{ secrets.X_USER_BEARER_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_POST_CTA: ${{ vars.X_POST_CTA || 'Follow @AILayoffAlerts for the daily signal.' }}
          X_POST_HASHTAGS: ${{ vars.X_POST_HASHTAGS || 'AILayoffs FutureOfWork' }}
        run: |
          python scripts/post_daily_x_headline.py --date "${{ steps.post-date.outputs.date }}"

      - name: Commit posted marker
        run: |
          if [ -z "$(git status --porcelain -- data/x-posted)" ]; then
            echo "No X post marker to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/x-posted
          git commit -m "Record daily X post"
          git push
