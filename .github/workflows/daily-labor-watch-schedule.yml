name: Daily AI Labor Watch Schedule

on:
  schedule:
    # Temporary test: 1:15 PM New York during daylight saving time. GitHub cron is UTC.
    - cron: "15 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ai-labor-watch-schedule
  cancel-in-progress: false

jobs:
  run-daily-labor-watch:
    uses: ./.github/workflows/daily-labor-watch.yml
    secrets: inherit
