name: Daily AI Labor Watch Schedule

on:
  schedule:
    # 9:30 AM New York during daylight saving time. GitHub cron is UTC.
    - cron: "30 13 * * *"
    # Backup runs. The generator skips if today's post already exists.
    - cron: "45 13 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ai-labor-watch-schedule
  cancel-in-progress: false

jobs:
  run-daily-labor-watch:
    uses: ./.github/workflows/daily-labor-watch.yml
    secrets: inherit
