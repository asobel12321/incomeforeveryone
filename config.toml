baseURL = "https://incomeforeveryone.org/"
languageCode = "en-us"
title = "Income For Everyone"
theme = "PaperMod"

[pagination]
  pagerSize = 8

[params]
  env = "production"
  defaultTheme = "light"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPageNums = true
  DateFormat = "January 2, 2006"
  description = "News-led daily briefs on AI, automation, job disruption, labor policy, and Universal Basic Income."
  mainSections = ["posts"]

[params.homeInfoParams]
  Title = "Tracking the labor shock behind the AI boom"
  Content = "Income For Everyone is a daily record of how AI and automation are changing work, weakening job security, and moving Universal Basic Income from theory toward practical policy."

[[menu.main]]
  identifier = "posts"
  name = "Briefs"
  url = "/posts/"
  weight = 1

[[menu.main]]
  identifier = "archives"
  name = "Archive"
  url = "/archives/"
  weight = 2

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 3
